version: '3.9'

services:
  api:
    container_name: evoapi
    image: atendai/evolution-api:homolog
    restart: always
    depends_on:
      - postgres
    ports:
      - 8080:8080
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evoapi-net
    env_file:
      - .env

  postgres:
    container_name: evoapi_postgres
    image: postgres:15
    command: ["postgres", "-c", "max_connections=1000"]
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=evoapi
      - POSTGRES_PASSWORD=6n*C%%7%Zzr2
      - POSTGRES_DB=evoapi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evoapi-net

  redis:
    container_name: evoapi_redis
    image: redis:latest
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    ports:
      - 6379:6379
    restart: always
    networks:
      - evoapi-net

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  evoapi-net:
    external: true
